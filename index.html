<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-leaf">🌿</div>
      Crop<span>Care</span> Pro
    </div>
    <div class="header-right">
      <div class="conn-badge" id="connBadge">
        <div class="conn-dot"></div>
        <span id="connText">Online</span>
      </div>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-inner">
      <button class="nav-btn active" data-page="detect">🔬 Detect</button>
      <button class="nav-btn" data-page="database">📚 Disease DB</button>
      <button class="nav-btn" data-page="tips">💡 Growth Tips</button>
      <button class="nav-btn" data-page="seasons">🌤️ Seasons</button>
      <button class="nav-btn" data-page="history">📋 History</button>
      <button class="nav-btn" data-page="about">ℹ️ About</button>
    </div>
  </nav>
</header>
    <-- hero section -->
    <div class="hero" id="heroSection">
  <div class="hero-grain"></div>
  <div class="hero-content">
    <div class="hero-tag">🌾 AI-Powered Agriculture</div>
    <h1>Detect. Diagnose.<br><em>Save Your Harvest.</em></h1>
    <p>Upload a photo of your crop leaf and get instant disease diagnosis with treatment recommendations — works completely offline.</p>
    <div class="hero-stats">
      <div class="stat"><span class="stat-num">50+</span><span class="stat-lbl">Diseases</span></div>
      <div class="stat"><span class="stat-num">15+</span><span class="stat-lbl">Crops</span></div>
      <div class="stat"><span class="stat-num">100%</span><span class="stat-lbl">Offline</span></div>
      <div class="stat"><span class="stat-num">&lt;2s</span><span class="stat-lbl">Result</span></div>
    </div>
  </div>
</div>

</body>
</html>
